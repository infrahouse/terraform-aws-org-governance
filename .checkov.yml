framework:
  - terraform
skip-path:
  - test_data
skip-check:
  - CKV_TF_1  # Module source version pinning - handled by Renovate
  - CKV_TF_2  # Module source version pinning - handled by Renovate

  # CKV_AWS_356: vanta_sso_permissions policy uses "*" resource for identitystore:* actions.
  # Identity Store actions do not support resource-level permissions — "*" is the only valid
  # resource. This policy is dictated by Vanta's integration requirements.
  - CKV_AWS_356

  # CKV_AWS_337: SSM parameter uses SecureString with the default aws/ssm key.
  # The Vanta external ID is a confused-deputy token, not a credential — default
  # encryption is sufficient and avoids requiring a CMK dependency.
  - CKV_AWS_337
compact: true
quiet: false
